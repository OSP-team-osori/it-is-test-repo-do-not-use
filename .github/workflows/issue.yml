name: Check Issue Title Convention

on:
  issues:
    types: [opened, edited]

# ✨ 추가된 부분: 봇이 이슈에 댓글을 달 수 있는 권한 부여
permissions:
  issues: write

jobs:
  check-title:
    runs-on: ubuntu-latest
    steps:
      - name: Check title regex
        uses: actions/github-script@v6
        with:
          script: |
            const title = context.payload.issue.title;
            // 대소문자 무시(i) 정규식으로 변경: [feat], [Feat], [FEAT] 모두 통과됨
            const regex = /^\[(feat|bug|refactor|docs|chore)\]/i;
            
            if (!regex.test(title)) {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: "🚨 **이슈 제목 규칙 위반!**\n제목을 `[태그] 내용` 형식으로 수정해주세요. (예: `[Feat] 로그인 구현`)\n✅ **사용 가능 태그:** Feat, Bug, Refactor, Docs, Chore"
              });
            }

