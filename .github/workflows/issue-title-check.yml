name: Check Issue Title Convention

on:
  issues:
    types: [opened, edited]

jobs:
  check-title:
    runs-on: ubuntu-latest
    steps:
      - name: Check title regex
        uses: actions/github-script@v6
        with:
          script: |
            const title = context.payload.issue.title;
            // 허용하는 태그 정규식 (Feat, Bug, Refactor, Docs, Chore)
            const regex = /^\[(Feat|Bug|Refactor|Docs|Chore)\].+/;
            
            if (!regex.test(title)) {
              // 규칙 위반 시 경고 댓글 달기
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: "🚨 **이슈 제목 규칙 위반!**\n제목을 `[태그] 내용` 형식으로 수정해주세요. (예: `[Feat] 로그인 구현`)\n사용 가능 태그: Feat, Bug, Refactor, Docs, Chore"
              });
              
              // (선택) 규칙을 안 지키면 이슈를 강제로 닫아버리고 싶다면 아래 주석 해제
              // await github.rest.issues.update({
              //   issue_number: context.issue.number,
              //   owner: context.repo.owner,
              //   repo: context.repo.repo,
              //   state: 'closed'
              // });
            }
